name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  macos:
    name: macOS (Xcode 26.1)
    runs-on: macos-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.1'

      - name: Show tool versions
        run: |
          xcodebuild -version
          swift --version
          node -v || true
          pnpm -v || true

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve Swift packages
        run: swift package resolve

      - name: Install SwiftLint/SwiftFormat
        run: |
          for tool in swiftlint swiftformat; do
            if brew list --formula "$tool" >/dev/null 2>&1; then
              if brew outdated --quiet "$tool" | grep -qx "$tool"; then
                brew upgrade "$tool"
              else
                brew list --versions "$tool"
              fi
            else
              brew install "$tool"
            fi
          done

      - name: Run checks
        run: pnpm check
